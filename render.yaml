services:
  - type: web
    name: leadgen-crm-server
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MY_BUSINESS_NAME
        sync: false
      - key: MY_CONTACT_EMAIL
        sync: false
      - key: PORT
        value: 10000
